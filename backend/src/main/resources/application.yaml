spring:
  application:
    name: course-enrollment

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:course_enrollment}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}

  sql:
    init:
      mode: never

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

  jackson:
    time-zone: Asia/Seoul

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.yujin.course_enrollment.entity, com.yujin.course_enrollment.dto.resp, com.yujin.course_enrollment.dto.req
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.yujin.course_enrollment: DEBUG

jwt:
  secret: ${JWT_SECRET}
  expiration: 900000

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

toss:
  secret-key: ${TOSS_SECRET_KEY:}
  webhook-secret: ${TOSS_WEBHOOK_SECRET:}
  confirm-url: https://api.tosspayments.com/v1/payments/confirm
  cancel-url-template: https://api.tosspayments.com/v1/payments/%s/cancel